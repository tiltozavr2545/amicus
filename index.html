<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Amicus — email подтверждён</title>
<style>
  :root { color-scheme: light dark; }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #f4f2fa;
    color: #1c1b1f;
  }
  @media (prefers-color-scheme: dark) {
    body { background: #1c1b1f; color: #eee0ff; }
    .card { background: #2a2735 !important; }
  }
  .card {
    max-width: 420px;
    width: 100%;
    background: #ffffff;
    border-radius: 20px;
    padding: 40px 32px;
    text-align: center;
    box-shadow: 0 8px 24px rgba(0,0,0,0.12);
  }
  .check {
    width: 64px;
    height: 64px;
    margin: 0 auto 20px;
    border-radius: 50%;
    background: #623aa2;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .check svg { width: 32px; height: 32px; }
  h1 {
    font-size: 22px;
    margin: 0 0 12px;
  }
  p {
    font-size: 15px;
    line-height: 1.5;
    margin: 0;
    opacity: 0.85;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="check">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M5 13l4 4L19 7" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <h1>Email подтверждён</h1>
    <p>Эту страницу можно закрыть — вернись в приложение Amicus и войди с этим email и паролем.</p>
  </div>
</body>
</html>
