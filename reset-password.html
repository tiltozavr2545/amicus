<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Amicus — новый пароль</title>
<style>
  :root { color-scheme: light dark; }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #f4f2fa;
    color: #1c1b1f;
  }
  @media (prefers-color-scheme: dark) {
    body { background: #1c1b1f; color: #eee0ff; }
    .card { background: #2a2735 !important; }
    input { background: #1c1b1f !important; color: #eee0ff !important; border-color: #4a4458 !important; }
  }
  .card {
    max-width: 420px;
    width: 100%;
    background: #ffffff;
    border-radius: 20px;
    padding: 40px 32px;
    text-align: center;
    box-shadow: 0 8px 24px rgba(0,0,0,0.12);
  }
  .icon {
    width: 64px;
    height: 64px;
    margin: 0 auto 20px;
    border-radius: 50%;
    background: #623aa2;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .icon svg { width: 32px; height: 32px; }
  h1 {
    font-size: 22px;
    margin: 0 0 12px;
  }
  p {
    font-size: 15px;
    line-height: 1.5;
    margin: 0 0 20px;
    opacity: 0.85;
  }
  form { text-align: left; }
  label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    margin: 0 0 6px;
  }
  input {
    width: 100%;
    padding: 12px 14px;
    border-radius: 12px;
    border: 1px solid #ccc5da;
    font-size: 15px;
    margin-bottom: 16px;
  }
  input:focus { outline: 2px solid #623aa2; outline-offset: 1px; }
  button {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 12px;
    background: #623aa2;
    color: #fff;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
  }
  button:disabled { opacity: 0.6; cursor: default; }
  .error { color: #b3261e; font-size: 14px; margin: 0 0 16px; }
  @media (prefers-color-scheme: dark) {
    .error { color: #ffb4ab; }
  }
</style>
</head>
<body>
  <div class="card" id="card">
    <div class="icon">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 10-8 0v2" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <div id="content">
      <h1>Загрузка…</h1>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = 'https://xtpdkldpihvcbyponjkj.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_dWJQrlGyLKoFxJ4KZ9MGBw_aBvh8wBL';
    const MIN_PASSWORD_LENGTH = 8;

    const content = document.getElementById('content');

    function renderError(message) {
      content.innerHTML =
        '<h1>Ссылка недействительна</h1>' +
        '<p>' + message + ' Вернись в приложение Amicus и запроси новую ссылку через «Забыли пароль?».</p>';
    }

    function renderSuccess() {
      content.innerHTML =
        '<h1>Пароль обновлён</h1>' +
        '<p>Эту страницу можно закрыть — вернись в приложение Amicus и войди с новым паролем.</p>';
    }

    function renderForm(client) {
      content.innerHTML =
        '<h1>Новый пароль</h1>' +
        '<p>Придумай новый пароль для входа в Amicus.</p>' +
        '<form id="reset-form">' +
        '<label for="password">Новый пароль</label>' +
        '<input id="password" type="password" autocomplete="new-password" minlength="' + MIN_PASSWORD_LENGTH + '" required>' +
        '<label for="password2">Повтори пароль</label>' +
        '<input id="password2" type="password" autocomplete="new-password" minlength="' + MIN_PASSWORD_LENGTH + '" required>' +
        '<div class="error" id="form-error" style="display:none"></div>' +
        '<button type="submit" id="submit-btn">Сохранить пароль</button>' +
        '</form>';

      const form = document.getElementById('reset-form');
      const errorEl = document.getElementById('form-error');
      const submitBtn = document.getElementById('submit-btn');

      form.addEventListener('submit', async (event) => {
        event.preventDefault();
        errorEl.style.display = 'none';

        const password = document.getElementById('password').value;
        const password2 = document.getElementById('password2').value;

        if (password.length < MIN_PASSWORD_LENGTH) {
          errorEl.textContent = 'Пароль должен быть не короче ' + MIN_PASSWORD_LENGTH + ' символов.';
          errorEl.style.display = 'block';
          return;
        }
        if (password !== password2) {
          errorEl.textContent = 'Пароли не совпадают.';
          errorEl.style.display = 'block';
          return;
        }

        submitBtn.disabled = true;
        submitBtn.textContent = 'Сохраняем…';

        const { error } = await client.auth.updateUser({ password });

        if (error) {
          errorEl.textContent = error.message;
          errorEl.style.display = 'block';
          submitBtn.disabled = false;
          submitBtn.textContent = 'Сохранить пароль';
          return;
        }

        await client.auth.signOut();
        renderSuccess();
      });
    }

    (function init() {
      const hashParams = new URLSearchParams(window.location.hash.replace(/^#/, ''));
      const errorDescription = hashParams.get('error_description');

      if (errorDescription) {
        renderError(decodeURIComponent(errorDescription.replace(/\+/g, ' ')));
        return;
      }

      const accessToken = hashParams.get('access_token');
      const refreshToken = hashParams.get('refresh_token');
      const type = hashParams.get('type');

      if (!accessToken || !refreshToken || type !== 'recovery') {
        renderError('В ссылке не хватает данных для сброса пароля — возможно, она была открыта не полностью.');
        return;
      }

      const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
        auth: { persistSession: false, detectSessionInUrl: false },
      });

      client.auth.setSession({ access_token: accessToken, refresh_token: refreshToken })
        .then(({ error }) => {
          if (error) {
            renderError('Ссылка устарела или уже использована.');
            return;
          }
          history.replaceState(null, '', window.location.pathname);
          renderForm(client);
        });
    })();
  </script>
</body>
</html>
